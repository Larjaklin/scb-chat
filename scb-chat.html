<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCB Statistikassistent — Länsstyrelsen VG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --accent:    #2ea44f;
      --accent2:   #58a6ff;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --user-bg:   #1f6feb22;
      --bot-bg:    #2ea44f12;
      --radius:    14px;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      z-index: 10;
    }

    .logo-ring {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .logo-ring svg { width: 20px; height: 20px; fill: var(--accent); }

    header h1 {
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .status-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages ── */
    #messages {
      overflow-y: auto;
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      padding: 0 24px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 0.68rem;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .msg-row.user .msg-label { color: var(--accent2); }
    .msg-row.bot  .msg-label { color: var(--accent); }

    .bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border-color: #1f6feb44;
      align-self: flex-end;
      max-width: 85%;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg);
      border-color: #2ea44f22;
      align-self: flex-start;
    }

    /* Markdown-liknande formatering i bot-svar */
    .bubble strong { font-weight: 600; color: #c9d1d9; }
    .bubble em { font-style: italic; color: var(--muted); }
    .bubble code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: #0d1117;
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 17px;
      border-radius: var(--radius);
      background: var(--bot-bg);
      border: 1px solid #2ea44f22;
      width: fit-content;
    }

    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 12px;
      max-width: 820px;
      width: 100%;
      margin: 8px auto 0;
    }

    .suggestion-btn {
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 7px 13px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .suggestion-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: #58a6ff11;
    }

    /* ── Input area ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 24px;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 16px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent2);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      field-sizing: content;
    }

    textarea::placeholder { color: var(--muted); }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: all 0.15s;
      align-self: flex-end;
    }

    .send-btn:hover:not(:disabled) {
      background: #3fb950;
      transform: scale(1.04);
    }

    .send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    .send-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .footer-meta {
      max-width: 820px;
      margin: 9px auto 0;
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .footer-meta a {
      color: var(--muted);
      text-decoration: none;
    }
    .footer-meta a:hover { color: var(--accent2); }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 32px;
      animation: fadeUp 0.4s ease;
    }

    .empty-state h2 {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.2;
    }

    .empty-state p {
      font-size: 0.9rem;
      max-width: 440px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-ring">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 3h18v2H3V3zm0 4h12v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2zm0 4h18v2H3v-2z"/>
    </svg>
  </div>
  <div>
    <h1>SCB Statistikassistent</h1>
    <p>Länsstyrelsen Västra Götaland · Statistikdatabasen</p>
  </div>
  <div class="status-dot">Live</div>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="empty-icon">📊</div>
    <h2>Vad vill du veta?</h2>
    <p>Ställ en fråga om statistik från SCB — befolkning, näringsliv, arbetsmarknad och mer för Västra Götalands kommuner.</p>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Vilken VG-kommun har flest invånare?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Lista alla kommuner i Västra Götaland</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Sök SCB-data om sysselsättning</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Befolkningsutveckling i Göteborg</button>
</div>

<footer>
  <div class="input-wrap">
    <textarea
      id="input"
      placeholder="Skriv din fråga…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Skicka">
      <svg viewBox="0 0 16 16"><path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-3-9-3V1.5z"/></svg>
    </button>
  </div>
  <div class="footer-meta">
    Drivs av n8n · SCB PxWebApi v2 · Länsstyrelsen VG
  </div>
</footer>

<script>
  const WEBHOOK_URL = "https://n8n-edu.walkstripe.cc/webhook/a1edeae7-f806-4b50-ab80-8e7077d5ca8e/chat";
  const sessionId = crypto.randomUUID();
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const emptyEl    = document.getElementById("empty");
  const sugsEl     = document.getElementById("suggestions");

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sugsEl.style.display = "none";
    sendMessage();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    if (emptyEl) emptyEl.remove();

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "Du" : "Assistent";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(label);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing";

    const label = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "Assistent";

    const bubble = document.createElement("div");
    bubble.className = "typing-bubble";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    row.appendChild(label);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sugsEl.style.display = "none";

    addMessage("user", text);
    addTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "sendMessage",
          sessionId: sessionId,
          chatInput: text
        })
      });

      removeTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // n8n returnerar output som sträng eller objekt
      let reply = "";
      if (typeof data === "string") {
        reply = data;
      } else if (data.output) {
        reply = data.output;
      } else if (data.text) {
        reply = data.text;
      } else if (Array.isArray(data) && data[0]?.output) {
        reply = data[0].output;
      } else {
        reply = JSON.stringify(data, null, 2);
      }

      addMessage("bot", reply);

    } catch (err) {
      removeTyping();
      addMessage("bot", `Kunde inte nå assistenten. Kontrollera att n8n-flödet är aktivt.\n\nFel: ${err.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
